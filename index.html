<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C Quest — Learn C by Playing</title>
  <style>
    :root {--bg:#0b1020;--card:#172039;--panel:#1f2d50;--text:#eaf1ff;--muted:#9fb0d9;--accent:#8b5cf6;--accent2:#22d3ee;--good:#34d399;--bad:#fb7185}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .app{max-width:1000px;margin:auto;padding:20px}.card{background:var(--card);border-radius:14px;padding:14px}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.main{display:grid;grid-template-columns:2fr 1fr;gap:14px}
    .hidden{display:none}.option,.line,button,select,input,textarea{background:var(--panel);color:var(--text);border:none;border-radius:10px;padding:10px}
    .option,.line{display:block;width:100%;text-align:left;margin:8px 0;cursor:pointer}.dropzone{min-height:120px;border:1px dashed var(--muted);padding:8px;border-radius:10px}
    button.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));font-weight:700;cursor:pointer}
    .good{color:var(--good)}.bad{color:var(--bad)}.muted{color:var(--muted)} .panel{margin-top:10px;padding:10px;border-radius:10px;background:#101830}
    #summaryModal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="app">
  <h1>🎮 C Quest</h1>
  <div class="row card">
    <div>XP: <b id="xp">0</b></div><div>Streak: <b id="streak">0</b></div><div id="progress">Challenge 1/5</div>
    <label>Mode <select id="modeSelect"><option value="mcq">MCQ</option><option value="parsons">Parsons</option><option value="debug">Debug</option><option value="lab">Lab</option></select></label>
  </div>
  <div class="main">
    <section class="card">
      <h2 id="promptTitle">Challenge</h2>
      <div id="mcq"></div><div id="parsons" class="hidden"></div><div id="debug" class="hidden"></div><div id="lab" class="hidden"></div>
      <div id="feedbackPanel" class="panel hidden"></div>
      <div class="row"><button id="submitBtn" class="primary">Submit</button><button id="nextBtn">Next</button></div>
    </section>
    <aside class="card">
      <h3>Hint</h3><p id="hint" class="muted">Read code left-to-right and track state changes.</p>
      <p class="muted">Next is gated until you submit/confirm each challenge.</p>
    </aside>
  </div>
</div>
<div id="summaryModal"><div class="card"><h2>Session Complete</h2><p id="summaryText"></p><button id="closeSummary" class="primary">Close</button></div></div>
<script>
const bank = {
  mcq: [
    {q:'What prints? for(int i=0;i<3;i++) printf("%d",i);', options:['012','123','01','0'], a:'012', tags:['loops']},
    {q:'Which is correct pointer declaration?', options:['int *p;','*int p;','ptr int p;','int p*;'], a:'int *p;', tags:['pointers']},
    {q:'arr[2] in int arr[5]={10,20,30,40,50}; is', options:['20','30','40','undefined'], a:'30', tags:['arrays']},
    {q:'Function prototype for sum returning int?', options:['int sum(int a,int b);','sum(int a,int b);','int sum(a,b);','function sum(int,int);'], a:'int sum(int a,int b);', tags:['functions']},
    {q:'if(x=5) does what in C?', options:['assigns 5 then true','compares x and 5','compile error','always false'], a:'assigns 5 then true', tags:['conditions']},
    {q:'Which loop may run zero times?', options:['while','do while','both always run','for never'], a:'while', tags:['loops']},
    {q:'Value of *(p+1) if p points to arr[0]={4,7,9}?', options:['4','7','9','address'], a:'7', tags:['pointers','arrays']},
    {q:'Best condition for even?', options:['n%2==0','n/2==0','n%2==1','n&2'], a:'n%2==0', tags:['conditions']},
    {q:'Recursive function needs', options:['base case','global variable','goto','macro'], a:'base case', tags:['functions']},
    {q:'Array index starts at', options:['0','1','-1','depends on compiler'], a:'0', tags:['arrays']}
  ],
  parsons: [
    {q:'Build a loop sum 1..n', lines:['int sum=0;','for(int i=1;i<=n;i++){','  sum += i;','}','printf("%d",sum);'], order:[0,1,2,3,4]},
    {q:'Swap two ints using temp', lines:['int temp=a;','a=b;','b=temp;'], order:[0,1,2]},
    {q:'Count zeros in array', lines:['int c=0;','for(int i=0;i<n;i++){',' if(arr[i]==0) c++;','}','printf("%d",c);'], order:[0,1,2,3,4]},
    {q:'Max of two numbers', lines:['int m=a;','if(b>m) m=b;','printf("%d",m);'], order:[0,1,2]},
    {q:'Pointer dereference print', lines:['int x=5;','int *p=&x;','printf("%d",*p);'], order:[0,1,2]},
    {q:'Function call sequence', lines:['int r = add(2,3);','printf("%d",r);'], order:[0,1]},
    {q:'while countdown', lines:['int i=3;','while(i>0){',' printf("%d",i);',' i--;','}'], order:[0,1,2,3,4]},
    {q:'if-else sign', lines:['if(x>=0)',' printf("non-negative");','else',' printf("negative");'], order:[0,1,2,3]},
    {q:'array input loop', lines:['for(int i=0;i<5;i++){',' scanf("%d", &arr[i]);','}'], order:[0,1,2]},
    {q:'factorial iterative', lines:['int f=1;','for(int i=1;i<=n;i++){',' f*=i;','}','printf("%d",f);'], order:[0,1,2,3,4]}
  ],
  debug: Array(10).fill(0).map((_,i)=>({q:[
    'Fix: if(n%2=0) printf("even");','Fix scanf bug: scanf("%d", n);','Fix loop bound for arr[5] using i<=5','Fix missing return in int add(int a,int b){a+b;}','Fix pointer init: int *p; *p=5;','Fix string compare with ==','Fix switch fall-through','Fix recursion without base case','Fix use of uninitialized variable','Fix off-by-one in factorial'
  ][i], rules:[
    ['==','%2'],['&n','scanf'],['i<5','loop'],['return','a+b'],['&x','p=&'],['strcmp','string'],['break','case'],['base','return'],['initialize','=0'],['i<=n','start1']
  ][i]})),
  lab: Array(10).fill(0).map((_,i)=>({q:[
    'Write loop to print 1 to 5','Write function header for int square(int x)','Write condition for leap year core rule','Write code to swap a and b','Write array traversal sum','Write pointer to variable x','Write if for positive number','Write while loop reading until -1','Write function call sum(2,4) into r','Write debug print of arr[i]'
  ][i], rules:[
    ['for','i<=5','printf'],['int square','('],['%4','&&','%100'],['temp','a=b','b=temp'],['sum','for','arr[i]'],['int *p','&x'],['if','x>0'],['while','-1','scanf'],['r','sum(2,4)'],['printf','arr[i]']
  ][i]}))
};
const state={mode:'mcq',idx:0,sessionDone:0,total:5,xp:0,streak:0,canNext:false,parsonsPool:[],parsonsAns:[]};
const $=id=>document.getElementById(id);
function updateProgress(){ $('progress').textContent=`Challenge ${Math.min(state.sessionDone+1,state.total)}/${state.total}`; $('xp').textContent=state.xp; $('streak').textContent=state.streak; }
function feedback(wrong,why,hint,ok=false){ const p=$('feedbackPanel'); p.classList.remove('hidden'); p.innerHTML=`<div class='${ok?'good':'bad'}'>${ok?'Correct!':'Needs work'}</div><b>What was wrong:</b> ${wrong}<br><b>Why it matters:</b> ${why}<br><b>Next step:</b> ${hint}`; }
function render(){ ['mcq','parsons','debug','lab'].forEach(m=>$(m).classList.add('hidden')); $(state.mode).classList.remove('hidden'); state.canNext=false; $('feedbackPanel').classList.add('hidden');
if(state.mode==='mcq'){const c=bank.mcq[state.idx%bank.mcq.length]; $('promptTitle').textContent=c.q; $('mcq').innerHTML=c.options.map(o=>`<button class='option' data-opt="${o}">${o}</button>`).join(''); $('mcq').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('mcq').dataset.sel=b.dataset.opt;});}
if(state.mode==='parsons'){const c=bank.parsons[state.idx%bank.parsons.length]; $('promptTitle').textContent=c.q; state.parsonsPool=[...c.lines]; state.parsonsAns=[]; drawParsons(); }
if(state.mode==='debug'){const c=bank.debug[state.idx%bank.debug.length]; $('promptTitle').textContent=c.q; $('debug').innerHTML='<textarea id="debugInput" rows="5" style="width:100%"></textarea>';}
if(state.mode==='lab'){const c=bank.lab[state.idx%bank.lab.length]; $('promptTitle').textContent=c.q; $('lab').innerHTML='<textarea id="labInput" rows="5" style="width:100%"></textarea>';}
updateProgress();}
function drawParsons(){ const pool=state.parsonsPool.map((l,i)=>`<button class='line' data-from='pool' data-i='${i}'>${l}</button>`).join(''); const ans=state.parsonsAns.map((l,i)=>`<button class='line' data-from='ans' data-i='${i}'>${l}</button>`).join(''); $('parsons').innerHTML=`<div class='muted'>Click to move lines between bank and answer (no duplicates).</div><h4>Code Bank</h4><div>${pool}</div><h4>Your Answer</h4><div class='dropzone'>${ans}</div><button id='resetParsons'>Reset Puzzle</button>`;
$('parsons').querySelectorAll('.line').forEach(btn=>btn.onclick=()=>{const from=btn.dataset.from; const i=+btn.dataset.i; if(from==='pool'){ state.parsonsAns.push(state.parsonsPool.splice(i,1)[0]); } else { state.parsonsPool.push(state.parsonsAns.splice(i,1)[0]); } drawParsons();}); $('resetParsons').onclick=()=>{const c=bank.parsons[state.idx%bank.parsons.length]; state.parsonsPool=[...c.lines]; state.parsonsAns=[]; drawParsons();}; }
function includesRules(text,rules){const t=text.toLowerCase(); return rules.every(r=>t.includes(r.toLowerCase()) || (r==='start1' && /for\s*\(\s*int\s+i\s*=\s*1/.test(t)));}
$('submitBtn').onclick=()=>{if(state.mode==='mcq'){const c=bank.mcq[state.idx%bank.mcq.length]; const sel=$('mcq').dataset.sel||''; if(sel===c.a){feedback('Nothing wrong.','You matched the concept correctly.','Press Next to continue.',true); pass();} else feedback(`Selected "${sel||'nothing'}" instead of correct logic.`,`Misreading basics causes cascading bugs in loops/pointers/functions.`,`Re-evaluate expression step-by-step, then resubmit.`);}
if(state.mode==='parsons'){const c=bank.parsons[state.idx%bank.parsons.length]; const good=JSON.stringify(state.parsonsAns)===JSON.stringify(c.order.map(i=>c.lines[i])); if(good){feedback('Nothing wrong.','Order of control flow is correct.','Proceed to next puzzle.',true); pass();} else feedback('Line order is incorrect or incomplete.','Program flow depends on exact statement order.','Reset if needed, then place init → loop/if → body → output.');}
if(state.mode==='debug'){const c=bank.debug[state.idx%bank.debug.length]; const text=$('debugInput').value; if(includesRules(text,c.rules)){feedback('Nothing wrong.','Your fix mentions key corrective tokens.','Advance or refine for readability.',true); pass();} else feedback('Your fix missed required correction clues.','Partial fixes leave compile/runtime failures unresolved.','Include these elements: '+c.rules.join(', '));}
if(state.mode==='lab'){const c=bank.lab[state.idx%bank.lab.length]; const text=$('labInput').value; if(includesRules(text,c.rules)){feedback('Nothing wrong.','Core constructs are present and aligned with intent.','Nice. Move next.',true); pass();} else feedback('Answer lacks critical building blocks.','Missing keywords means solution cannot satisfy spec.','Add required pieces: '+c.rules.join(', '));}
};
function pass(){state.canNext=true; state.xp+=10; state.streak+=1;}
$('nextBtn').onclick=()=>{if(!state.canNext){feedback('You tried to skip submission.','Skipping removes retrieval practice, reducing retention.','Submit first, then Next unlocks.'); return;} state.idx++; state.sessionDone++; if(state.sessionDone>=state.total){$('summaryText').textContent=`You completed ${state.total}/${state.total} challenges with ${state.xp} XP earned.`; $('summaryModal').style.display='flex'; state.sessionDone=0;} render();};
$('closeSummary').onclick=()=>{$('summaryModal').style.display='none';};
$('modeSelect').onchange=e=>{state.mode=e.target.value; state.idx=0; render();};
render();
</script>
</body>
</html>
